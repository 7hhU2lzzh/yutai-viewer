name: 3-Hour Yutai Update
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          BASIC_USER: ${{ secrets.BASIC_USER }}
          BASIC_PASS: ${{ secrets.BASIC_PASS }}
        run: python yutai_scraper.py
      - name: Commit kokuzetsu.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kokuzetsu.json prev.json name_cache.json
          git diff --staged --quiet || git commit -m "Update kokuzetsu.json / name_cache.json"
          git push
