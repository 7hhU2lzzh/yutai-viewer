name: Yutai Update (8h interval)
on:
  schedule:
    # JST 9:01, 17:01, 1:01 (翌日)
    # = UTC 0:01, 8:01, 16:01
    - cron: '1 0 * * *'
    - cron: '1 8 * * *'
    - cron: '1 16 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Restore persistent data
        run: |
          # ✅ 修正: night_snapshot_history.json を restore リストに追加
          for f in prev.json kokuzetsu.json name_cache.json night_snapshot.json night_snapshot_history.json; do
            if [ -f "$f" ]; then
              echo "✅ $f exists"
            else
              echo "{}" > "$f"
              echo "📝 $f created (empty)"
            fi
          done
          # zaiko_history ディレクトリ確保
          mkdir -p zaiko_history
      - name: Run scraper
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python yutai_scraper.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prev.json kokuzetsu.json name_cache.json night_snapshot.json night_snapshot_history.json
          git add stock_data.json kokuzetsu_data.json
          git add stock_full_data.json kenri_map.json
          git add zaiko_history/
          git diff --cached --quiet || git commit -m "auto: update stock data $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
