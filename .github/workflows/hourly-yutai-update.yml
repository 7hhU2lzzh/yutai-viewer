name: Hourly Yutai Update

on:
  schedule:
    # 毎時1分に実行（UTC）
    # JST 23:01 = UTC 14:01 もこのスケジュールでカバーされる
    - cron: '1 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore persistent data
        run: |
          # prev.json, kokuzetsu.json, name_cache.json, night_snapshot.json を復元
          for f in prev.json kokuzetsu.json name_cache.json night_snapshot.json; do
            if [ -f "$f" ]; then
              echo "✅ $f exists"
            else
              echo "{}" > "$f"
              echo "📝 $f created (empty)"
            fi
          done

      - name: Run scraper
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python yutai_scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prev.json kokuzetsu.json name_cache.json night_snapshot.json stock_data.json kokuzetsu_data.json
          git diff --cached --quiet || git commit -m "auto: update stock data $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
